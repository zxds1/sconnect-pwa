version: "3.9"

services:
  pwa:
    container_name: sconnect-pwa
    build:
      context: .
      dockerfile: Dockerfile.local
      network: host
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env.docker.local
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://host.docker.internal:8000}
      VITE_TENANT_ID: ${VITE_TENANT_ID:-}
      VITE_USER_ID: ${VITE_USER_ID:-}
      VITE_AUTH_TOKEN: ${VITE_AUTH_TOKEN:-}
      VITE_ROLE: ${VITE_ROLE:-}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
      - pwa-node-modules:/app/node_modules
      - pwa-vite-cache:/app/.vite
    command: npm run dev -- --host 0.0.0.0 --port 3000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

volumes:
  pwa-node-modules:
  pwa-vite-cache:
