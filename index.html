<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <meta name="theme-color" content="#0b0b0d" />
    <title>Sconnect</title>
    <script>
      (function () {
        var isLocalHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (!isLocalHost) return;
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
              registrations.forEach(function (registration) {
                registration.unregister();
              });
            });
          }
        } catch (error) {}
        try {
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              keys.forEach(function (key) {
                caches.delete(key);
              });
            });
          }
        } catch (error) {}
      })();
    </script>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <div class="splash-nodes">
        <span class="node node-a"></span>
        <span class="node node-b"></span>
        <span class="node node-c"></span>
        <span class="node node-d"></span>
        <span class="node node-e"></span>
        <span class="node node-f"></span>
        <span class="node node-g"></span>
        <span class="node node-h"></span>
        <span class="node node-i"></span>
        <span class="node node-j"></span>
        <span class="node node-k"></span>
        <span class="node node-l"></span>
        <span class="node node-m"></span>
        <span class="node node-n"></span>
        <span class="node node-o"></span>
        <span class="node node-p"></span>
        <span class="node node-q"></span>
        <span class="node node-r"></span>
      </div>
      <div class="splash-inner">
        <img src="/logo.jpg" alt="" class="splash-logo" />
        <div class="splash-mark">Sconnect</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
